<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
  </head>
  <body>
    <!-- Main app wrapper: centered, max-width controlled by CSS -->
    <div id="app">
      <div class="todo-app">
        <header class="todo-app__header">
          <h1 class="todo-app__title">Todo List</h1>
          <div id="auth-block" class="auth-block" aria-live="polite">
            <!-- Filled by main.js: guest (Create account / Sign in) or signed-in (email + Sign out) -->
          </div>
        </header>
        <!-- Auth modals (hidden by default) -->
        <div id="auth-modal-backdrop" class="auth-modal-backdrop" hidden aria-hidden="true"></div>
        <div id="auth-modal" class="auth-modal" role="dialog" aria-labelledby="auth-modal-title" hidden aria-hidden="true">
          <h2 id="auth-modal-title" class="auth-modal__title">Sign in</h2>
          <div id="auth-modal-message" class="auth-modal__message" role="status"></div>
          <form id="auth-form" class="auth-form">
            <label class="auth-form__label">Email <input type="email" id="auth-email" class="auth-form__input" autocomplete="email" required /></label>
            <label class="auth-form__label">Password <input type="password" id="auth-password" class="auth-form__input" autocomplete="current-password" /></label>
            <div class="auth-form__actions">
              <button type="submit" id="auth-submit" class="auth-form__submit">Submit</button>
              <button type="button" id="auth-cancel" class="auth-form__cancel">Cancel</button>
            </div>
          </form>
        </div>
        <!-- Form: submit adds a new todo; input and button are targeted by main.js -->
        <form class="todo-form" id="todo-form" aria-label="Add todo">
          <input
            type="text"
            class="todo-form__input"
            id="todo-input"
            name="todo"
            placeholder="What needs to be done?"
            autocomplete="off"
            aria-label="Todo description"
          />
          <button type="submit" class="todo-form__submit">Add</button>
        </form>
        <!-- List container: todo items are rendered here by renderTodoList() -->
        <ul class="todo-list" id="todo-list" aria-label="Todo items"></ul>
      </div>
    </div>
    <!-- Entry point: loads styles and wires up form + list events -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
