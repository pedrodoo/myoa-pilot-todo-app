<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Ultra&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Corben:wght@400;700&display=swap" rel="stylesheet" />
    <title>Todo -iiism</title>
  </head>
  <body>
    <!-- Main app wrapper: centered, max-width controlled by CSS -->
    <div id="app">
      <header class="todo-app__header">
        <div class="todo-app__header-left">
          <div class="todo-app__header-top">
            <button type="button" id="hamburger-btn" class="hamburger-btn" aria-label="Menu" aria-expanded="false" aria-controls="hamburger-menu">
              <span class="hamburger-btn__line"></span>
              <span class="hamburger-btn__line"></span>
              <span class="hamburger-btn__line"></span>
            </button>
            <div class="todo-app__header-title-area">
              <h1 class="todo-app__title">Todo -iiism</h1>
              <div id="onboarding-guide" class="onboarding" aria-label="How to use this app" hidden>
                <p id="onboarding-text" class="onboarding__text"></p>
                <div class="onboarding__step-dots" role="tablist" aria-label="Steps">
                  <span role="tab" class="onboarding__step-dot" data-step="0" aria-selected="true" tabindex="0"></span>
                  <span role="tab" class="onboarding__step-dot" data-step="1" aria-selected="false" tabindex="-1"></span>
                  <span role="tab" class="onboarding__step-dot" data-step="2" aria-selected="false" tabindex="-1"></span>
                </div>
              </div>
            </div>
            <div id="auth-block" class="auth-block" aria-live="polite"></div>
          </div>
          <div class="todo-filters" id="todo-filters" aria-label="Filter and sort tasks">
            <label class="todo-filters__label">Sort by
              <select id="filter-sort-by" class="todo-filters__select" aria-label="Sort by">
                <option value="created">Created</option>
                <option value="dueDate">Due date</option>
                <option value="importance">Importance</option>
                <option value="category">Category</option>
                <option value="status">Status</option>
              </select>
            </label>
            <label class="todo-filters__label">Order
              <select id="filter-sort-order" class="todo-filters__select" aria-label="Sort order">
                <option value="asc">Ascending</option>
                <option value="desc">Descending</option>
              </select>
            </label>
            <label class="todo-filters__label">Filter
              <select id="filter-type" class="todo-filters__select" aria-label="Filter">
                <option value="all">All</option>
                <option value="importance">High importance</option>
                <option value="overdue">Overdue</option>
                <option value="dueToday">Due today</option>
                <option value="noDate">No date</option>
                <option value="category">By category</option>
              </select>
            </label>
            <select id="filter-category" class="todo-filters__select todo-filters__select--category" aria-label="Category filter" hidden>
              <option value="">Select category</option>
            </select>
            <button type="button" id="manage-categories-btn" class="todo-filters__manage-btn">Manage categories</button>
          </div>
        </div>
      </header>
      <!-- Hamburger menu (mobile): Create account / Sign in or Signed in + Sign out -->
      <div id="hamburger-menu" class="hamburger-menu" aria-hidden="true">
        <div id="hamburger-menu-backdrop" class="hamburger-menu__backdrop"></div>
        <div class="hamburger-menu__panel">
          <div id="hamburger-menu-content" class="hamburger-menu__content"></div>
        </div>
      </div>
        <!-- Auth modals (hidden by default) -->
        <div id="auth-modal-backdrop" class="auth-modal-backdrop" hidden aria-hidden="true"></div>
        <div id="auth-modal" class="auth-modal" role="dialog" aria-labelledby="auth-modal-title" hidden aria-hidden="true">
          <h2 id="auth-modal-title" class="auth-modal__title">Sign in</h2>
          <div id="auth-modal-message" class="auth-modal__message" role="status"></div>
          <form id="auth-form" class="auth-form">
            <div id="auth-form-email-row">
              <label class="auth-form__label">Email <input type="email" id="auth-email" class="auth-form__input" autocomplete="email" required /></label>
            </div>
            <div id="auth-form-password-row">
              <label class="auth-form__label">Password
                <div class="auth-form__password-wrap">
                  <input type="password" id="auth-password" class="auth-form__input auth-form__input--with-toggle" autocomplete="current-password" />
                  <button type="button" class="auth-form__password-toggle" aria-label="Show password">
                    <svg class="auth-form__password-icon auth-form__password-icon--show" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    <svg class="auth-form__password-icon auth-form__password-icon--hide" hidden xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                  </button>
                </div>
              </label>
            </div>
            <p id="auth-form-recover" class="auth-form__recover">
              <button type="button" class="auth-form__link" data-auth-action="recover">Forgot password?</button>
            </p>
            <p id="auth-form-back" class="auth-form__back" hidden>
              <button type="button" class="auth-form__link" data-auth-action="signin">Back to sign in</button>
            </p>
            <div id="auth-form-set-password" class="auth-form__set-password" hidden>
              <label class="auth-form__label">New password <input type="password" id="auth-new-password" class="auth-form__input" autocomplete="new-password" /></label>
              <label class="auth-form__label">Confirm password <input type="password" id="auth-password-confirm" class="auth-form__input" autocomplete="new-password" /></label>
            </div>
            <div class="auth-form__actions">
              <button type="submit" id="auth-submit" class="auth-form__submit">Submit</button>
              <button type="button" id="auth-cancel" class="auth-form__cancel">Cancel</button>
            </div>
          </form>
        </div>
        <!-- Add-todo modal: set importance, due date, category before adding -->
        <div id="add-todo-modal-backdrop" class="auth-modal-backdrop add-todo-modal-backdrop" hidden aria-hidden="true"></div>
        <div id="add-todo-modal" class="auth-modal add-todo-modal" role="dialog" aria-labelledby="add-todo-modal-title" hidden aria-hidden="true">
          <div class="auth-modal__header auth-modal__header--with-close">
            <h2 id="add-todo-modal-title" class="auth-modal__title">Add todo</h2>
            <button type="button" id="add-todo-modal-close" class="auth-modal__close" aria-label="Close">
              <svg class="auth-modal__close-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
          </div>
          <form id="add-todo-modal-form" class="auth-form add-todo-modal__form">
            <div class="auth-form__label">
              Task
              <input type="text" id="add-todo-modal-task" class="auth-form__input" placeholder="Task description" aria-label="Task description" />
            </div>
            <div class="auth-form__label" role="group" aria-label="Importance">
              Importance
              <div class="pill-group" id="add-todo-modal-importance" role="radiogroup" aria-label="Importance">
                <button type="button" class="pill pill--selectable" role="radio" aria-checked="true" data-value="">None</button>
                <button type="button" class="pill pill--selectable" role="radio" aria-checked="false" data-value="low">Low</button>
                <button type="button" class="pill pill--selectable" role="radio" aria-checked="false" data-value="medium">Medium</button>
                <button type="button" class="pill pill--selectable" role="radio" aria-checked="false" data-value="high">High</button>
              </div>
            </div>
            <div class="auth-form__label">
              Due date
              <input type="date" id="add-todo-modal-due-date" class="auth-form__input" />
            </div>
            <div class="auth-form__label" role="group" aria-label="Category">
              Category
              <div class="category-pills-and-add">
                <div class="pill-group pill-group--categories" id="add-todo-modal-category-pills" role="radiogroup" aria-label="Category">
                  <button type="button" class="pill pill--selectable" role="radio" aria-checked="true" data-value="">None</button>
                </div>
                <button type="button" id="add-todo-modal-category-toggle-btn" class="pill pill--selectable category-add-inline__toggle" aria-expanded="false" aria-controls="add-todo-modal-category-add-form">+ Add</button>
              </div>
              <div id="add-todo-modal-category-add-form" class="category-add-inline__form" hidden>
                <div class="categories-form__row">
                  <label class="auth-form__label categories-form__name-label">Name <input type="text" id="add-todo-modal-category-new-name" class="auth-form__input" placeholder="Category name" aria-label="New category name" /></label>
                  <label class="auth-form__label categories-form__color-label">Color <input type="color" id="add-todo-modal-category-new-color" class="auth-form__input auth-form__input--color" value="#10b981" aria-label="New category color" /></label>
                  <button type="button" id="add-todo-modal-category-add-btn" class="pill pill--selectable category-add-inline__submit">Save</button>
                  <button type="button" id="add-todo-modal-category-cancel-btn" class="category-add-inline__cancel" aria-label="Cancel add category">×</button>
                </div>
              </div>
            </div>
            <div class="auth-form__actions">
              <button type="submit" class="auth-form__submit">Add</button>
            </div>
          </form>
        </div>
        <!-- Edit todo modal: same structure as Add (task, importance, due date, category, move to column) -->
        <div id="edit-todo-modal-backdrop" class="auth-modal-backdrop" hidden aria-hidden="true"></div>
        <div id="edit-todo-modal" class="auth-modal add-todo-modal" role="dialog" aria-labelledby="edit-todo-modal-title" hidden aria-hidden="true">
          <div class="auth-modal__header auth-modal__header--with-close">
            <h2 id="edit-todo-modal-title" class="auth-modal__title">Edit todo</h2>
            <button type="button" id="edit-todo-modal-close" class="auth-modal__close" aria-label="Close">
              <svg class="auth-modal__close-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
          </div>
          <form id="edit-todo-modal-form" class="auth-form add-todo-modal__form">
            <div class="auth-form__label">
              Task
              <input type="text" id="edit-todo-modal-text" class="auth-form__input" placeholder="Task description" aria-label="Task description" />
            </div>
            <div class="auth-form__label" role="group" aria-label="Importance">
              Importance
              <div class="pill-group" id="edit-todo-modal-importance" role="radiogroup" aria-label="Importance">
                <button type="button" class="pill pill--selectable" role="radio" aria-checked="false" data-value="">None</button>
                <button type="button" class="pill pill--selectable" role="radio" aria-checked="false" data-value="low">Low</button>
                <button type="button" class="pill pill--selectable" role="radio" aria-checked="false" data-value="medium">Medium</button>
                <button type="button" class="pill pill--selectable" role="radio" aria-checked="false" data-value="high">High</button>
              </div>
            </div>
            <div class="auth-form__label">
              Due date
              <input type="date" id="edit-todo-modal-due-date" class="auth-form__input" />
            </div>
            <div class="auth-form__label" role="group" aria-label="Category">
              Category
              <div class="category-pills-and-add">
                <div class="pill-group pill-group--categories" id="edit-todo-modal-category-pills" role="radiogroup" aria-label="Category">
                  <button type="button" class="pill pill--selectable" role="radio" aria-checked="true" data-value="">None</button>
                </div>
                <button type="button" id="edit-todo-modal-category-toggle-btn" class="pill pill--selectable category-add-inline__toggle" aria-expanded="false" aria-controls="edit-todo-modal-category-add-form">+ Add</button>
              </div>
              <div id="edit-todo-modal-category-add-form" class="category-add-inline__form" hidden>
                <div class="categories-form__row">
                  <label class="auth-form__label categories-form__name-label">Name <input type="text" id="edit-todo-modal-category-new-name" class="auth-form__input" placeholder="Category name" aria-label="New category name" /></label>
                  <label class="auth-form__label categories-form__color-label">Color <input type="color" id="edit-todo-modal-category-new-color" class="auth-form__input auth-form__input--color" value="#10b981" aria-label="New category color" /></label>
                  <button type="button" id="edit-todo-modal-category-add-btn" class="pill pill--selectable category-add-inline__submit">Save</button>
                  <button type="button" id="edit-todo-modal-category-cancel-btn" class="category-add-inline__cancel" aria-label="Cancel add category">×</button>
                </div>
              </div>
            </div>
            <div class="auth-form__label">
              Move to column
              <select id="edit-todo-modal-status" class="auth-form__input">
                <option value="tasks">Inbox</option>
                <option value="to_do">To do</option>
                <option value="doing">Doing</option>
                <option value="completed">Completed</option>
              </select>
            </div>
            <div class="auth-form__actions">
              <button type="submit" class="auth-form__submit">Save</button>
              <button type="button" id="edit-todo-modal-cancel" class="auth-form__cancel">Cancel</button>
            </div>
          </form>
        </div>
        <!-- Delete confirm dialog -->
        <div id="delete-confirm-backdrop" class="auth-modal-backdrop" hidden aria-hidden="true"></div>
        <div id="delete-confirm-modal" class="auth-modal delete-confirm-modal" role="dialog" aria-labelledby="delete-confirm-title" aria-modal="true" hidden aria-hidden="true">
          <h2 id="delete-confirm-title" class="auth-modal__title">Delete card</h2>
          <p id="delete-confirm-message" class="auth-modal__message">Are you sure you want to delete this card?</p>
          <div class="delete-confirm__actions">
            <button type="button" id="delete-confirm-yes" class="auth-form__submit">Yes</button>
            <button type="button" id="delete-confirm-cancel" class="auth-form__cancel">Cancel</button>
          </div>
        </div>
        <!-- Categories modal: add category, list categories -->
        <div id="categories-modal-backdrop" class="auth-modal-backdrop" hidden aria-hidden="true"></div>
        <div id="categories-modal" class="auth-modal add-todo-modal" role="dialog" aria-labelledby="categories-modal-title" hidden aria-hidden="true">
          <div class="auth-modal__header auth-modal__header--with-close">
            <h2 id="categories-modal-title" class="auth-modal__title">Manage categories</h2>
            <button type="button" id="categories-modal-close" class="auth-modal__close" aria-label="Close">
              <svg class="auth-modal__close-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
          </div>
          <ul id="categories-list" class="categories-list" aria-label="Your categories"></ul>
          <form id="categories-form" class="auth-form add-todo-modal__form">
            <div class="categories-form__row">
              <label class="auth-form__label categories-form__name-label">Name <input type="text" id="category-name" class="auth-form__input" placeholder="Category name" /></label>
              <label class="auth-form__label categories-form__color-label">Color <input type="color" id="category-color" class="auth-form__input auth-form__input--color" value="#10b981" /></label>
            </div>
            <div class="auth-form__actions">
              <button type="submit" class="auth-form__submit">Add category</button>
            </div>
          </form>
        </div>
        <!-- Add-todo bar: full width above the Kanban -->
        <form class="todo-form" id="todo-form" aria-label="Add todo">
          <input
            type="text"
            class="todo-form__input"
            id="todo-input"
            name="todo"
            placeholder="What needs to be done?"
            autocomplete="off"
            aria-label="Todo description"
          />
          <button type="submit" class="todo-form__submit">Add to inbox</button>
        </form>
        <!-- Kanban board: four columns (Inbox | To do | Doing | Completed) -->
        <div class="kanban" id="kanban" role="application" aria-label="Kanban board">
          <div class="kanban__column" data-status="tasks" id="kanban-column-tasks">
            <h2 class="kanban__column-title">Inbox</h2>
            <ul class="kanban__list" id="kanban-list-tasks" aria-label="Inbox column"></ul>
            <button type="button" class="kanban__add-btn" data-add-to-status="tasks" aria-label="Add task to Inbox">+</button>
          </div>
          <div class="kanban__column" data-status="to_do" id="kanban-column-to_do">
            <h2 class="kanban__column-title">To do</h2>
            <ul class="kanban__list" id="kanban-list-to_do" aria-label="To do column"></ul>
            <button type="button" class="kanban__add-btn" data-add-to-status="to_do" aria-label="Add task to To do">+</button>
          </div>
          <div class="kanban__column" data-status="doing" id="kanban-column-doing">
            <h2 class="kanban__column-title">Doing</h2>
            <ul class="kanban__list" id="kanban-list-doing" aria-label="Doing column"></ul>
            <button type="button" class="kanban__add-btn" data-add-to-status="doing" aria-label="Add task to Doing">+</button>
          </div>
          <div class="kanban__column" data-status="completed" id="kanban-column-completed">
            <h2 class="kanban__column-title">Completed</h2>
            <ul class="kanban__list" id="kanban-list-completed" aria-label="Completed column"></ul>
            <button type="button" class="kanban__add-btn" data-add-to-status="completed" aria-label="Add task to Completed">+</button>
          </div>
        </div>
        <!-- Mobile-only: sticky bottom add bar -->
        <form id="mobile-add-bar" class="mobile-add-bar" aria-label="Add todo">
          <input type="text" id="mobile-add-bar-input" class="mobile-add-bar__input" placeholder="What needs to be done?" autocomplete="off" aria-label="Todo description" />
          <button type="submit" class="mobile-add-bar__submit">Add</button>
        </form>
    </div>
    <!-- Toast for transient messages (e.g. signed in) -->
    <div id="toast" class="toast" role="status" aria-live="polite" hidden aria-hidden="true"></div>
    <!-- Entry point: loads styles and wires up form + list events -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
