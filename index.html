<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
  </head>
  <body>
    <div id="app">
      <div class="todo-app">
        <header class="todo-app__header">
          <h1 class="todo-app__title">Todo List</h1>
        </header>
        <form class="todo-form" id="todo-form" aria-label="Add todo">
          <input
            type="text"
            class="todo-form__input"
            id="todo-input"
            name="todo"
            placeholder="What needs to be done?"
            autocomplete="off"
            aria-label="Todo description"
          />
          <button type="submit" class="todo-form__submit">Add</button>
        </form>
        <ul class="todo-list" id="todo-list" aria-label="Todo items"></ul>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
